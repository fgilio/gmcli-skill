name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
      - run: cd src && composer install --no-progress
      - run: cd src && composer test:lint

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
      - run: cd src && composer install --no-progress
      - run: cd src && composer test:types

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Prettier gate for authored Markdown and YAML only. The bundled JSON doc
      # corpus and src/vendor are excluded on purpose (see .prettierignore).
      - run: npx --yes prettier@3 --check "**/*.{md,mdx,yml,yaml}"
